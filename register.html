<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – CyberShield AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050a14;
            --bg-card: #0d1f3c;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --text-primary: #e8f4fd;
            --text-muted: #6b8cad;
            --border-color: #1a3a5c;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .register-container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .shield-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--accent-green);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.3); }
        }

        .brand-logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .brand-logo h1 span { color: var(--accent-green); }
        .brand-logo p { color: var(--text-muted); font-size: 0.9rem; }

        .card-auth {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card-auth::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: rgba(0, 255, 136, 0.03);
            border-color: var(--accent-green);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.08);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-muted); opacity: 0.6; }

        .password-strength { height: 4px; border-radius: 2px; margin-top: 0.5rem; transition: all 0.3s; }
        .strength-weak { background: var(--accent-red); width: 33%; }
        .strength-medium { background: var(--accent-orange); width: 66%; }
        .strength-strong { background: var(--accent-green); width: 100%; }

        .btn-register {
            background: linear-gradient(135deg, var(--accent-green), #00cc66);
            color: #000;
            font-weight: 700;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.3);
        }

        .btn-register:disabled { opacity: 0.7; transform: none; }

        .link-cyber { color: var(--accent-cyan); text-decoration: none; font-weight: 500; }
        .link-cyber:hover { text-decoration: underline; }

        .alert-cyber {
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            display: none;
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.15);
            color: #ff6b7a;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .alert-success-msg {
            background: rgba(0, 255, 136, 0.1);
            color: #00d4a8;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="brand-logo">
        <div class="shield-icon"><i class="fas fa-user-shield"></i></div>
        <h1>Cyber<span>Shield</span> AI</h1>
        <p>Create your security account</p>
    </div>

    <div class="card-auth">
        <h5 class="mb-4" style="font-weight: 600;">Create New Account</h5>

        <div class="alert-cyber alert-error" id="error-msg"></div>
        <div class="alert-cyber alert-success-msg" id="success-msg"></div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-user me-1"></i>Username</label>
            <input type="text" class="form-control" id="username" placeholder="Choose a username (min 3 chars)" autocomplete="username">
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-envelope me-1"></i>Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-lock me-1"></i>Password</label>
            <input type="password" class="form-control" id="password" placeholder="Minimum 6 characters" oninput="checkStrength(this.value)" autocomplete="new-password">
            <div class="password-strength mt-1" id="strength-bar" style="width:0;background:transparent;"></div>
            <small id="strength-text" style="color: var(--text-muted); font-size: 0.75rem;"></small>
        </div>

        <div class="mb-4">
            <label class="form-label"><i class="fas fa-lock me-1"></i>Confirm Password</label>
            <input type="password" class="form-control" id="confirm-password" placeholder="Re-enter your password" autocomplete="new-password">
        </div>

        <button class="btn-register" id="reg-btn" onclick="handleRegister()">
            <i class="fas fa-user-plus me-2"></i>Create Account
        </button>

        <div class="divider">or</div>

        <div class="text-center">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Already have an account? </span>
            <a href="/login" class="link-cyber">Sign in</a>
        </div>
    </div>

    <div class="text-center mt-3" style="color: var(--text-muted); font-size: 0.75rem;">
        <i class="fas fa-shield-halved me-1"></i>Passwords are hashed with bcrypt – never stored in plain text
    </div>
</div>

<script>
    if (localStorage.getItem('access_token')) {
        window.location.href = '/dashboard';
    }

    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    function showError(msg) {
        errorMsg.textContent = '⚠ ' + msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
        successMsg.textContent = '✓ ' + msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    function checkStrength(pwd) {
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        if (!pwd) { bar.style.width = '0'; text.textContent = ''; return; }
        if (pwd.length < 6) {
            bar.className = 'password-strength strength-weak';
            text.textContent = 'Weak – too short';
            text.style.color = '#ff4757';
        } else if (pwd.length < 10 || !/[A-Z]/.test(pwd) || !/[0-9]/.test(pwd)) {
            bar.className = 'password-strength strength-medium';
            text.textContent = 'Medium – add uppercase & numbers';
            text.style.color = '#ffa502';
        } else {
            bar.className = 'password-strength strength-strong';
            text.textContent = 'Strong password ✓';
            text.style.color = '#00ff88';
        }
    }

    async function handleRegister() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;
        const btn = document.getElementById('reg-btn');

        errorMsg.style.display = 'none';

        if (!username || !email || !password || !confirm) {
            showError('All fields are required');
            return;
        }
        if (username.length < 3) {
            showError('Username must be at least 3 characters');
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            showError('Please enter a valid email address');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }
        if (password !== confirm) {
            showError('Passwords do not match');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" style="width:1rem;height:1rem;border-width:2px;"></span>Creating account...';

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (data.success) {
                showSuccess('Account created! Redirecting to login...');
                setTimeout(() => window.location.href = '/login?registered=1', 1200);
            } else {
                showError(data.message || 'Registration failed');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
        } catch (err) {
            showError('Network error. Please try again.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleRegister();
    });
</script>
</body>
</html>
