<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CyberShield AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050a14;
            --bg-card: #0d1f3c;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --text-primary: #e8f4fd;
            --text-muted: #6b8cad;
            --border-color: #1a3a5c;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo .shield-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 255, 136, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--accent-cyan);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.15); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.35); }
        }

        .brand-logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: -0.5px;
        }

        .brand-logo h1 span { color: var(--accent-green); }
        .brand-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }

        .card-auth {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card-auth::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            background: rgba(0, 212, 255, 0.05);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-muted); opacity: 0.6; }

        .input-group-text {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
        }

        .input-group .form-control { border-left: none; }

        .btn-login {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            color: #000;
            font-weight: 700;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-login:disabled { opacity: 0.7; transform: none; }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .link-cyber { color: var(--accent-cyan); text-decoration: none; font-weight: 500; }
        .link-cyber:hover { color: var(--accent-green); text-decoration: underline; }

        .alert-cyber {
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            display: none;
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.15);
            color: #ff6b7a;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .alert-success-msg {
            background: rgba(0, 255, 136, 0.1);
            color: #00d4a8;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .spinner-border-sm { width: 1rem; height: 1rem; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="brand-logo">
        <div class="shield-icon">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1>Cyber<span>Shield</span> AI</h1>
        <p>AI-Powered Phishing Defense System</p>
    </div>

    <div class="card-auth">
        <h5 class="mb-4" style="font-weight: 600;">Sign In to Your Account</h5>

        <div class="alert-cyber alert-error" id="error-msg"></div>
        <div class="alert-cyber alert-success-msg" id="success-msg"></div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-user me-1"></i>Username or Email</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username or email" autocomplete="username">
        </div>

        <div class="mb-4">
            <label class="form-label"><i class="fas fa-lock me-1"></i>Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-key"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Enter password" autocomplete="current-password">
            </div>
        </div>

        <button class="btn-login" id="login-btn" onclick="handleLogin()">
            <i class="fas fa-right-to-bracket me-2"></i>Sign In
        </button>

        <div class="divider">or</div>

        <div class="text-center">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Don't have an account? </span>
            <a href="/register" class="link-cyber">Create account</a>
        </div>
    </div>

    <div class="text-center mt-3" style="color: var(--text-muted); font-size: 0.75rem;">
        <i class="fas fa-lock me-1"></i>Secured with bcrypt encryption & JWT authentication
    </div>
</div>

<script>
    // Check if already logged in
    if (localStorage.getItem('access_token')) {
        window.location.href = '/dashboard';
    }

    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    function showError(msg) {
        errorMsg.textContent = '⚠ ' + msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
        successMsg.textContent = '✓ ' + msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    // Show success message if came from registration
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('registered')) {
        showSuccess('Account created! Please sign in.');
    }

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        errorMsg.style.display = 'none';

        if (!username || !password) {
            showError('Please fill in all fields');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem('access_token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => window.location.href = '/dashboard', 800);
            } else {
                showError(data.message || 'Login failed');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-right-to-bracket me-2"></i>Sign In';
            }
        } catch (err) {
            showError('Network error. Please try again.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-right-to-bracket me-2"></i>Sign In';
        }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
